jobs:
  automation_job:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.14'

      - name: 📦 Install Dependencies
        run: |
          pip install google-genai requests

      - name: 🤖 Step 1: Generate Story & Scripts
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          CATEGORIES: ${{ secrets.CATEGORIES }}
          VIDEO_STORY_PROMPT: ${{ secrets.VIDEO_STORY_PROMPT }}
        run: python video-gen.py --step content

      - name: 🎬 Step 2: Render Veo Video
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python video-gen.py --step video

      - name: 📸 Step 3: Create Imagen Teaser
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python video-gen.py --step image

      - name: 📤 Step 4: Publish to Facebook
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
        run: python video-gen.py --step publish
