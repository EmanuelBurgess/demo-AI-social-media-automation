name: actions-video-gen

on:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch: 

jobs:
  post-to-facebook:
    runs-on: ubuntu-latest
    env: # Setting global envs so all steps can see them
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
      FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
      CATEGORIES: ${{ secrets.CATEGORIES }}
      VIDEO_STORY_PROMPT: ${{ secrets.VIDEO_STORY_PROMPT }}

    steps:
      - name: 📥 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 3. Install Dependencies
        run: pip install requests google-genai

      - name: 🤖 4. Generate AI Story (Gemini)
        run: python3 video-gen.py --step content

      - name: 🎬 5. Render Reel Video (Veo)
        run: python3 video-gen.py --step video

      - name: 📸 6. Create Story Teaser (Imagen)
        run: python3 video-gen.py --step image

      - name: 📤 7. Final Publish to Facebook
        run: python3 video-gen.py --step publish
